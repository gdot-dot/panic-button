<!DOCTYPE html>
<html>
<head>
  <title>專注分頁設定</title>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; font-family: sans-serif; padding: 10px; }
    h3 { margin-top: 0; }
    textarea { width: 95%; height: 150px; margin-bottom: 10px; }
    button { width: 100%; padding: 8px; }
    #status { color: green; text-align: center; height: 20px; }
  </style>
</head>
<body>

  <textarea id="whitelist"></textarea>
  <button id="save">儲存設定</button>
  <div id="status"></div>

  <script src="popup.js"></script>

</html>
